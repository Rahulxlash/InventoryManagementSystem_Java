<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" 
      layout:decorate="~{layout}">
<head>
    <title>Purchases - Inventory Management System</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Purchase Transactions</h2>
            <a href="/purchases/new" class="btn btn-primary">
                <i class="fas fa-plus me-2"></i>New Purchase
            </a>
        </div>

        <div class="row mb-4">
            <div class="col-md-6">
                <form th:action="@{/purchases}" method="get" class="d-flex">
                    <input type="text" name="search" class="form-control me-2" 
                           placeholder="Search purchases..." th:value="${search}">
                    <button type="submit" class="btn btn-outline-secondary">
                        <i class="fas fa-search"></i>
                    </button>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>Purchase ID</th>
                                <th>Product Code</th>
                                <th>Product Name</th>
                                <th>Quantity</th>
                                <th>Total Cost</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="purchase : ${purchases}">
                                <td th:text="${purchase.purchaseId}"></td>
                                <td th:text="${purchase.productCode}"></td>
                                <td th:text="${purchase.product?.prodName ?: 'N/A'}"></td>
                                <td th:text="${purchase.quantity}"></td>
                                <td th:text="'$' + ${purchase.totalCost}"></td>
                                <td>
                                    <form th:action="@{/purchases/{id}/delete(id=${purchase.purchaseId})}" 
                                          method="post" class="d-inline"
                                          onsubmit="return confirm('Are you sure you want to delete this purchase?')">
                                        <button type="submit" class="btn btn-sm btn-outline-danger">
                                            <i class="fas fa-trash"></i> Delete
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(purchases)}">
                                <td colspan="6" class="text-center text-muted">No purchases found</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
