<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" 
      layout:decorate="~{layout}">
<head>
    <title>Users - Inventory Management System</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>System Users</h2>
            <a href="/users/new" class="btn btn-primary">
                <i class="fas fa-plus me-2"></i>Add User
            </a>
        </div>

        <div class="row mb-4">
            <div class="col-md-6">
                <form th:action="@{/users}" method="get" class="d-flex">
                    <input type="text" name="search" class="form-control me-2" 
                           placeholder="Search users..." th:value="${search}">
                    <button type="submit" class="btn btn-outline-secondary">
                        <i class="fas fa-search"></i>
                    </button>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>Full Name</th>
                                <th>Username</th>
                                <th>Location</th>
                                <th>Phone</th>
                                <th>User Type</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="user : ${users}">
                                <td th:text="${user.fullName}"></td>
                                <td th:text="${user.username}"></td>
                                <td th:text="${user.location}"></td>
                                <td th:text="${user.phone}"></td>
                                <td>
                                    <span th:text="${user.userType}" 
                                          th:class="${user.userType == 'ADMINISTRATOR' ? 'badge bg-danger' : 'badge bg-primary'}"></span>
                                </td>
                                <td>
                                    <a th:href="@{/users/{id}/edit(id=${user.id})}" 
                                       class="btn btn-sm btn-outline-primary me-2">
                                        <i class="fas fa-edit"></i> Edit
                                    </a>
                                    <form th:action="@{/users/{id}/delete(id=${user.id})}" 
                                          method="post" class="d-inline"
                                          onsubmit="return confirm('Are you sure you want to delete this user?')">
                                        <button type="submit" class="btn btn-sm btn-outline-danger">
                                            <i class="fas fa-trash"></i> Delete
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(users)}">
                                <td colspan="6" class="text-center text-muted">No users found</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
